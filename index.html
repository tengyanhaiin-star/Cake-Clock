<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>Frosted Moments · 3D Cake Clock</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime&family=Noticia+Text:ital@0;1&display=swap" rel="stylesheet">
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="mobile-web-app-capable" content="yes"/>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { width: 100%; height: 100%; background: #1a0e06; }
  body { width: 100%; height: 100%; min-height: -webkit-fill-available; overflow: hidden; background: #1a0e06; touch-action: none; }
  #c { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; touch-action: none; }

  #ui {
    position: fixed; bottom: 24px; left: 0; right: 0;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    pointer-events: none; user-select: none;
  }
  #timeDisplay {
    font-family: 'Courier Prime', 'Courier New', monospace;
    font-size: 22px; letter-spacing: .22em;
    color: #e8d5a0; text-shadow: 0 0 18px #c9a84c88;
  }
  #hint {
    font-family: 'Noticia Text', Georgia, serif; font-size: 18px;
    color: #7a5a3a; letter-spacing: .12em;
  }
  #title {
    position: fixed; top: 20px; left: 0; right: 0; text-align: center;
    font-family: 'Noticia Text', Georgia, serif; font-size: 18px; font-style: italic;
    letter-spacing: .22em; color: #c9a84c; text-shadow: 0 0 20px #c9a84c55;
    pointer-events: none;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="title">Frosted Moments</div>
<div id="ui">
  <div id="timeDisplay">--:--:--</div>
  <div id="hint">Drag to rotate &nbsp;·&nbsp; Pinch to zoom</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── OrbitControls (inline, r128 compatible) ──
(function(){
const _target=new THREE.Vector3(),_spherical=new THREE.Spherical(),_sphericalDelta=new THREE.Spherical();
let _scale=1,_zoomChanged=false;
const _rotateStart=new THREE.Vector2(),_rotateEnd=new THREE.Vector2(),_rotateDelta=new THREE.Vector2();
const EPS=0.000001;
THREE.OrbitControls=function(object,domElement){
  this.object=object; this.domElement=domElement||document;
  this.enabled=true; this.target=new THREE.Vector3();
  this.minDistance=0; this.maxDistance=Infinity;
  this.minPolarAngle=0; this.maxPolarAngle=Math.PI;
  this.enableDamping=false; this.dampingFactor=0.05;
  this.enableZoom=true; this.zoomSpeed=1.0;
  this.enableRotate=true; this.rotateSpeed=1.0;
  const scope=this;
  const STATE={NONE:-1,ROTATE:0,DOLLY:1};
  let state=STATE.NONE;
  const offset=new THREE.Vector3();
  const quat=new THREE.Quaternion().setFromUnitVectors(object.up,new THREE.Vector3(0,1,0));
  const quatInverse=quat.clone().invert();
  const lastPosition=new THREE.Vector3();
  let lastQuaternion=new THREE.Quaternion();
  this.update=function(){
    const position=scope.object.position;
    offset.copy(position).sub(scope.target);
    offset.applyQuaternion(quat);
    _spherical.setFromVector3(offset);
    if(scope.enableDamping){
      _spherical.theta+=_sphericalDelta.theta*scope.dampingFactor;
      _spherical.phi+=_sphericalDelta.phi*scope.dampingFactor;
    } else {
      _spherical.theta+=_sphericalDelta.theta;
      _spherical.phi+=_sphericalDelta.phi;
    }
    _spherical.phi=Math.max(EPS,Math.min(scope.maxPolarAngle-EPS,_spherical.phi));
    _spherical.makeSafe();
    _spherical.radius*=_scale;
    _spherical.radius=Math.max(scope.minDistance,Math.min(scope.maxDistance,_spherical.radius));
    offset.setFromSpherical(_spherical);
    offset.applyQuaternion(quatInverse);
    position.copy(scope.target).add(offset);
    scope.object.lookAt(scope.target);
    if(scope.enableDamping){
      _sphericalDelta.theta*=(1-scope.dampingFactor);
      _sphericalDelta.phi*=(1-scope.dampingFactor);
    } else {
      _sphericalDelta.set(0,0,0);
    }
    _scale=1;
    if(_zoomChanged||lastPosition.distanceToSquared(scope.object.position)>EPS||8*(1-lastQuaternion.dot(scope.object.quaternion))>EPS){
      lastPosition.copy(scope.object.position);
      lastQuaternion.copy(scope.object.quaternion);
      _zoomChanged=false; return true;
    }
    return false;
  };
  function onMouseDown(e){
    if(!scope.enabled) return;
    if(e.button===0){state=STATE.ROTATE;_rotateStart.set(e.clientX,e.clientY);}
    document.addEventListener('mousemove',onMouseMove);
    document.addEventListener('mouseup',onMouseUp);
  }
  function onMouseMove(e){
    if(!scope.enabled) return;
    if(state===STATE.ROTATE){
      _rotateEnd.set(e.clientX,e.clientY);
      _rotateDelta.subVectors(_rotateEnd,_rotateStart).multiplyScalar(scope.rotateSpeed);
      const el=scope.domElement===document?scope.domElement.body:scope.domElement;
      _sphericalDelta.theta-=2*Math.PI*_rotateDelta.x/el.clientHeight;
      _sphericalDelta.phi-=2*Math.PI*_rotateDelta.y/el.clientHeight;
      _rotateStart.copy(_rotateEnd);
    }
    scope.update();
  }
  function onMouseUp(){state=STATE.NONE;document.removeEventListener('mousemove',onMouseMove);document.removeEventListener('mouseup',onMouseUp);}
  function onWheel(e){
    if(!scope.enabled||!scope.enableZoom) return;
    e.preventDefault();
    if(e.deltaY<0) _scale*=Math.pow(0.95,scope.zoomSpeed);
    else if(e.deltaY>0) _scale/=Math.pow(0.95,scope.zoomSpeed);
    _zoomChanged=true; scope.update();
  }
  // Touch
  const _touchStart=new THREE.Vector2(),_touchEnd=new THREE.Vector2();
  let _pinchDist0=0;
  function getTouchDist(e){
    const dx=e.touches[0].pageX-e.touches[1].pageX;
    const dy=e.touches[0].pageY-e.touches[1].pageY;
    return Math.sqrt(dx*dx+dy*dy);
  }
  function onTouchStart(e){
    if(e.touches.length===1){state=STATE.ROTATE;_rotateStart.set(e.touches[0].pageX,e.touches[0].pageY);}
    else if(e.touches.length===2){state=STATE.DOLLY;_pinchDist0=getTouchDist(e);}
  }
  function onTouchMove(e){
    e.preventDefault();
    if(e.touches.length===1&&state===STATE.ROTATE){
      _rotateEnd.set(e.touches[0].pageX,e.touches[0].pageY);
      _rotateDelta.subVectors(_rotateEnd,_rotateStart).multiplyScalar(scope.rotateSpeed);
      const el=scope.domElement===document?scope.domElement.body:scope.domElement;
      _sphericalDelta.theta-=2*Math.PI*_rotateDelta.x/el.clientHeight;
      _sphericalDelta.phi-=2*Math.PI*_rotateDelta.y/el.clientHeight;
      _rotateStart.copy(_rotateEnd);
      scope.update();
    } else if(e.touches.length===2&&state===STATE.DOLLY){
      const dist=getTouchDist(e);
      if(_pinchDist0>0){
        const factor=dist/_pinchDist0;
        _scale=factor>1?Math.max(0.9,2-factor):Math.min(1.1,2-factor);
        _zoomChanged=true; scope.update();
      }
      _pinchDist0=dist;
    }
  }
  function onTouchEnd(){state=STATE.NONE;_pinchDist0=0;}
  domElement.addEventListener('mousedown',onMouseDown);
  domElement.addEventListener('wheel',onWheel,{passive:false});
  domElement.addEventListener('touchstart',onTouchStart,{passive:true});
  domElement.addEventListener('touchmove',onTouchMove,{passive:false});
  domElement.addEventListener('touchend',onTouchEnd);
  this.update();
};
})();

// ════════════════════════════════════════════
// Build scene
async function buildScene() {
  try {
    const font = new FontFace('Abril Fatface', "url('./AbrilFatface-Regular.ttf')");
    await font.load();
    document.fonts.add(font);
  } catch(e) {
    console.warn('Local font load failed. Please ensure AbrilFatface-Regular.ttf is in the same directory as the HTML file.', e);
  }

const canvas = document.getElementById('c');
const vvp = window.visualViewport;
const W = vvp ? vvp.width : window.innerWidth;
const H = vvp ? vvp.height : window.innerHeight;

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(W, H);
renderer.setClearColor(0x1a0e06, 1);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(48, W/H, 0.1, 100);
camera.position.set(0, 4.2, 0);

const controls = new THREE.OrbitControls(camera, canvas);
controls.target.set(0, 0, 0);
camera.up.set(0, 0, 1); // -Z = 12 o'clock appears at top of screen
controls.enableDamping = true;
controls.rotateSpeed = 0.3;
controls.dampingFactor = 0.08;
controls.minDistance = 2;
controls.maxDistance = 18;
controls.maxPolarAngle = Math.PI * 0.82;
controls.update();

function onResize() {
  const vvp = window.visualViewport;
  const w = vvp ? vvp.width : window.innerWidth;
  const h = vvp ? vvp.height : window.innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', onResize);
window.addEventListener('orientationchange', () => setTimeout(onResize, 300));
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', onResize);
}

// ── Lights ──
scene.add(new THREE.AmbientLight(0xfff5e8, 0.18));
const key = new THREE.DirectionalLight(0xfff0d0, 0.55);
key.position.set(5, 10, 6); key.castShadow = true;
key.shadow.mapSize.width = key.shadow.mapSize.height = 1024;
scene.add(key);
const fill = new THREE.DirectionalLight(0xd0e8ff, 0.15);
fill.position.set(-4, 3, -3); scene.add(fill);
const rim = new THREE.DirectionalLight(0xffe0c0, 0.18);
rim.position.set(0, 6, -8); scene.add(rim);

const candleLights = [];
[[0,0],[0.29,-0.29],[0.29,0.29],[-0.29,0.29],[-0.29,-0.29]].forEach(([lx,lz],i)=>{
  const pl=new THREE.PointLight(0xffaa33,0.3,5);
  pl.position.set(lx, 2.5, lz);
  scene.add(pl); candleLights.push(pl);
});

// ── Helpers ──
function mat(color, roughness=0.75, metalness=0){
  return new THREE.MeshStandardMaterial({color,roughness,metalness});
}
function cyl(rt,rb,h,segs=40){
  return new THREE.CylinderGeometry(rt,rb,h,segs);
}
function mesh(geo,mat){ const m=new THREE.Mesh(geo,mat); m.castShadow=true; return m; }

const C={
  chocDark:0x3d1a08, chocMid:0x5a2810, chocLight:0x7a3e1e,
  cream:0xe8d8c0, ivory:0xead9be, icingCream:0xe0c9a8,
  rose:0xd4798a, rosePale:0xe8b4bc, blush:0xf0d4c8,
  sage:0x8a9e7e, sagePale:0xb8cba8,
  gold:0xc9a84c, goldPale:0xe8d5a0,
};

// ── cakeGroup — shift down so visual center ≈ y=0 ──
const cakeGroup = new THREE.Group();
cakeGroup.position.y = -1.1;
scene.add(cakeGroup);

function add(m){ cakeGroup.add(m); return m; }
function addMesh(geo,m){ return add(mesh(geo,m)); }

// ── Stand ──
const sb=addMesh(cyl(1.3,1.5,0.18,40), mat(C.chocMid));
sb.position.y=-2.5;
const sr=add(mesh(new THREE.TorusGeometry(1.4,0.04,8,40), mat(C.gold,0.3,0.7)));
sr.rotation.x=Math.PI/2; sr.position.y=-2.41;
const sp=addMesh(cyl(0.18,0.22,0.45,20), mat(C.chocDark));
sp.position.y=-2.18;
const plate=addMesh(cyl(2.0,1.95,0.07,40), mat(C.cream,0.5));
plate.position.y=-2.06;
plate.receiveShadow=true;
const plateRim=add(mesh(new THREE.TorusGeometry(1.97,0.04,6,40),mat(C.gold,0.3,0.6)));
plateRim.rotation.x=Math.PI/2; plateRim.position.y=-2.02;

// ── Tier layout — zero gaps ──
const IT = 0.09; // icing thickness
const t1={r:1.8,  h:1.1,  yBot:-1.97};
const t2={r:1.28, h:1.0,  yBot: t1.yBot+t1.h};
const t3={r:0.84, h:0.85, yBot: t2.yBot+t2.h};
[t1,t2,t3].forEach(t=>{ t.yCenter=t.yBot+t.h/2; t.yTop=t.yBot+t.h; });

function buildTier(t, icingColor, nDrips, nRos){
  // body
  const body=addMesh(cyl(t.r, t.r*1.03, t.h, 40), mat(C.chocLight,0.88));
  body.position.y=t.yCenter;
  // icing disc
  const ic=addMesh(cyl(t.r+0.02,t.r+0.02,IT,40), mat(icingColor,0.5));
  ic.position.y=t.yTop+IT/2;
  // drips
  for(let i=0;i<nDrips;i++){
    const a=(i/nDrips)*Math.PI*2;
    const len=0.1+0.09*Math.abs(Math.sin(i*1.37));
    const dr=addMesh(new THREE.SphereGeometry(0.055+0.03*Math.abs(Math.sin(i*1.7)),8,8), mat(icingColor,0.5));
    dr.scale.y=2.3;
    dr.position.set(Math.cos(a)*(t.r+0.01), t.yTop+0.02-len, Math.sin(a)*(t.r+0.01));
  }
  // rosettes
  const rc=[C.rosePale,C.sagePale,C.goldPale];
  for(let i=0;i<nRos;i++){
    const a=(i/nRos)*Math.PI*2;
    const ro=addMesh(new THREE.SphereGeometry(0.09,10,10),mat(rc[i%3],0.45));
    ro.position.set(Math.cos(a)*(t.r-0.18), t.yTop+IT+0.045, Math.sin(a)*(t.r-0.18));
  }
  return t.yTop+IT;
}

buildTier(t1, C.icingCream, 20, 16);
buildTier(t2, C.rosePale,   15, 12);
const CLOCK_BOTTOM = buildTier(t3, C.sagePale, 10, 0);

// ── Side decorations on tier3 (avoid covering clock face) ──
for(let i=0;i<8;i++){
  const a=(i/8)*Math.PI*2;
  const cols=[C.rosePale,C.sagePale,C.goldPale,C.rose];
  const ro=addMesh(new THREE.SphereGeometry(0.055,10,10),mat(cols[i%4],0.45));
  ro.position.set(Math.cos(a)*(t3.r+0.02), t3.yCenter+0.1, Math.sin(a)*(t3.r+0.02));
}

// ── Clock face — canvas texture with Roman numerals ──
const CR = t3.r - 0.01;
const FACE_DISC_H = 0.06;

// Draw the clock face onto a canvas, then use as texture
// All radii as fractions of fc2 so UV mapping is device-independent.
// CircleGeometry(CR) UV: pixel at radius r → world radius CR*(r/fc2).
const FC = 1024; // high-res for retina
const faceCanvas = document.createElement('canvas');
faceCanvas.width = faceCanvas.height = FC;
const fctx = faceCanvas.getContext('2d');
const fc2 = FC / 2;

// Radii as fractions of fc2 — these fractions map directly to world radii via CR*(frac)
const R_FACE       = fc2 * 0.995; // face fill circle
const R_INNER_RING = fc2 * 0.54;  // inner decorative ring
const R_OUTER      = fc2 * 0.969; // outer tick ring  (was fc2-8 at 512px)
const R_INNER      = fc2 * 0.898; // inner tick ring  (was fc2-26 at 512px)
const isIPhone = /iPhone/.test(navigator.userAgent);
const R_NUMERALS   = fc2 * (isIPhone ? 0.40 : 0.44);  // iPhone vs desktop

// Background: ivory
fctx.fillStyle = '#ede0c8';
fctx.beginPath(); fctx.arc(fc2,fc2,R_FACE,0,Math.PI*2); fctx.fill();

// Subtle sugar-grain texture
fctx.fillStyle = 'rgba(200,185,165,0.18)';
for(let i=0;i<1800;i++){
  const tx=Math.random()*FC, ty=Math.random()*FC;
  const dx=tx-fc2, dy=ty-fc2;
  if(dx*dx+dy*dy<(fc2-4)*(fc2-4)){
    fctx.beginPath(); fctx.arc(tx,ty,1.4,0,Math.PI*2); fctx.fill();
  }
}

// Inner decorative ring
fctx.strokeStyle = 'rgba(201,168,76,0.5)'; fctx.lineWidth = 3;
fctx.beginPath(); fctx.arc(fc2,fc2,R_INNER_RING,0,Math.PI*2); fctx.stroke();

// 60 ticks between R_OUTER and R_INNER
for(let m=0;m<60;m++){
  const a=(m/60)*Math.PI*2 - Math.PI/2;
  const isMaj=m%5===0;
  fctx.strokeStyle=isMaj?'#7a5c10':'#a08030';
  fctx.lineWidth=isMaj?8:4;
  fctx.beginPath();
  fctx.moveTo(fc2+Math.cos(a)*R_OUTER, fc2+Math.sin(a)*R_OUTER);
  fctx.lineTo(fc2+Math.cos(a)*R_INNER, fc2+Math.sin(a)*R_INNER);
  fctx.stroke();
}

// Outer gold ring — drawn AFTER ticks
fctx.strokeStyle = '#c9a84c'; fctx.lineWidth = 6;
fctx.beginPath(); fctx.arc(fc2,fc2,R_OUTER,0,Math.PI*2); fctx.stroke();
// Inner gold ring
fctx.strokeStyle = '#c9a84c'; fctx.lineWidth = 3;
fctx.beginPath(); fctx.arc(fc2,fc2,R_INNER,0,Math.PI*2); fctx.stroke();

// Roman numerals — base toward center
const romans=['XII','I','II','III','IV','V','VI','VII','VIII','IX','X','XI'];
fctx.fillStyle = '#3d1a08';
fctx.textAlign = 'center';
fctx.textBaseline = 'bottom';
for(let h=0;h<12;h++){
  const a=(h/12)*Math.PI*2 - Math.PI/2;
  const tx=fc2+Math.cos(a)*R_NUMERALS;
  const ty=fc2+Math.sin(a)*R_NUMERALS;
  fctx.save();
  fctx.translate(tx, ty);
  fctx.rotate(a + Math.PI/2);
  fctx.font = `240px 'Abril Fatface', Georgia, serif`;
  fctx.save();
  fctx.scale(0.48, 1);
  fctx.fillText(romans[h], 0, 0);
  fctx.restore();
  fctx.restore();
}

// Center dot
fctx.fillStyle='rgba(201,168,76,0.6)';
fctx.beginPath(); fctx.arc(fc2,fc2,12,0,Math.PI*2); fctx.fill();

// ── Approach: draw XII at canvas BOTTOM, place textured plane ABOVE disc ──
// Three.js PlaneGeometry (after rotating flat): UV +V direction = world +Z
// So canvas bottom (low V) = -Z, canvas top (high V) = +Z... 
// Actually after rotation.x = -PI/2: original +Y → +Z, original -Y → -Z
// PlaneGeometry UV: v=1 at top of plane (original +Y = world +Z after rotation)
// So: canvas TOP = world +Z. Draw XII at canvas TOP → XII faces +Z.
// Hand must extend toward +Z. Clockwise rotation.y = negative.

// Redraw canvas with XII at TOP using standard -PI/2 angle offset (already done)
// No texture rotation needed.
const faceTex = new THREE.CanvasTexture(faceCanvas);
faceTex.center.set(0.5, 0.5);
faceTex.rotation = Math.PI;

// Single textured plane, raised clearly above the disc to avoid z-fighting
const facePlane = new THREE.Mesh(
  new THREE.CircleGeometry(CR, 64),
  new THREE.MeshStandardMaterial({ map: faceTex, roughness: 0.25, depthWrite: true })
);
facePlane.rotation.x = -Math.PI / 2;
facePlane.position.y = CLOCK_BOTTOM + FACE_DISC_H + 0.003;
cakeGroup.add(facePlane);

// Physical ivory disc underneath
const faceGeo = cyl(CR, CR, FACE_DISC_H, 64);
const clockDisc = new THREE.Mesh(faceGeo, mat(0xddc9a8, 0.45));
clockDisc.castShadow = true;
clockDisc.position.y = CLOCK_BOTTOM + FACE_DISC_H/2;
cakeGroup.add(clockDisc);
const FACE_TOP = CLOCK_BOTTOM + FACE_DISC_H;

// bezel
const bezel=add(mesh(new THREE.TorusGeometry(CR+0.012,0.034,8,64),mat(C.gold,0.28,0.65)));
bezel.rotation.x=Math.PI/2; bezel.position.y=CLOCK_BOTTOM+FACE_DISC_H*0.6;

// bezel rosettes
for(let i=0;i<12;i++){
  const a=(i/12)*Math.PI*2;
  const cols=[C.rose,C.sage,C.gold];
  const ro=addMesh(new THREE.SphereGeometry(0.036,8,8),mat(cols[i%3],0.4));
  ro.position.set(Math.sin(a)*(CR+0.008), FACE_TOP+0.022, Math.cos(a)*(CR+0.008));
}

// ── Clock hands — pivot group trick ──
// Mesh extends along -Z (= 12 o'clock). Rotate pivot Y for time direction.
// Clockwise = negative rotation.y in Three.js (right-hand rule around +Y)
const HAND_Y = FACE_TOP + 0.004;

function makeHand(length, tailLen, w, h, color, yOffset){
  const pivot = new THREE.Group();
  pivot.position.set(0, HAND_Y + yOffset, 0);
  const geo = new THREE.BoxGeometry(w, h, length + tailLen);
  // shift so that pivot is at "tailLen" from back end
  const m = mesh(geo, mat(color, 0.5));
  m.position.z = +(length/2 - tailLen/2);
  pivot.add(m);
  cakeGroup.add(pivot);
  return pivot;
}

const hourPivot = makeHand(0.36, 0.09, 0.04,  0.013, 0x1a0800,   0);
const minPivot  = makeHand(0.60, 0.15, 0.026, 0.011, 0x2a1005,   0.01);
const secPivot  = makeHand(0.72, 0.18, 0.011, 0.009, 0xe8a000,   0.02);

// center cap
const cap=addMesh(cyl(0.04,0.04,0.024,16),mat(C.gold,0.2,0.7));
cap.position.set(0,HAND_Y+0.032,0);
const capDot=addMesh(cyl(0.017,0.017,0.015,16),mat(C.chocDark,0.5));
capDot.position.set(0,HAND_Y+0.044,0);

// ── Candles (on top of clock face) ──
const CANDLE_Y = FACE_TOP;
const cBodyCols=[C.rosePale,C.sagePale,C.goldPale,C.rose,C.sagePale];
const flameOuters=[], flameInners=[];
// Candle positions: center + 4 corners between numerals (45°,135°,225°,315°)
const CR_c = CR * 0.25; // inside numeral ring
const candlePositions = [
  [0, 0],                                                          // center
  [ 0,       -CR_c],  // 12 o'clock
  [ CR_c,     0   ],  // 3 o'clock
  [ 0,        CR_c],  // 6 o'clock
  [-CR_c,     0   ],  // 9 o'clock
];
candlePositions.forEach(([cx,cz],i)=>{
  const g=new THREE.Group();
  g.position.set(cx, CANDLE_Y, cz);
  const body=mesh(cyl(0.048,0.053,0.3,12),mat(cBodyCols[i],0.7));
  body.position.y=0.15; g.add(body);
  const wax=mesh(cyl(0.058,0.058,0.024,12),mat(C.cream,0.5));
  wax.position.y=0.312; g.add(wax);
  const wick=mesh(cyl(0.004,0.004,0.048,6),mat(0x222222,1));
  wick.position.y=0.352; g.add(wick);
  const fo=mesh(new THREE.ConeGeometry(0.038,0.12,8),
    new THREE.MeshStandardMaterial({color:0xffaa22,emissive:0xff7700,emissiveIntensity:1,roughness:0.3,transparent:true,opacity:0.88}));
  fo.position.y=0.43; g.add(fo); flameOuters.push(fo);
  const fi=mesh(new THREE.ConeGeometry(0.019,0.08,8),
    new THREE.MeshStandardMaterial({color:0xffee88,emissive:0xffcc22,emissiveIntensity:1.4,roughness:0.2,transparent:true,opacity:0.93}));
  fi.position.y=0.445; g.add(fi); flameInners.push(fi);
  cakeGroup.add(g);
});

// ── Sugar flowers ──
function flower(x,y,z,c1,c2,sc=1){
  for(let p=0;p<6;p++){
    const a=(p/6)*Math.PI*2;
    const pm=addMesh(new THREE.SphereGeometry(0.06*sc,8,8),mat(c1,0.4));
    pm.position.set(x+Math.cos(a)*0.075*sc, y, z+Math.sin(a)*0.075*sc);
  }
  const cm=addMesh(new THREE.SphereGeometry(0.042*sc,8,8),mat(c2,0.3));
  cm.position.set(x,y,z);
}
for(let i=0;i<6;i++){const a=(i/6)*Math.PI*2; flower(Math.cos(a)*t1.r*0.7,t1.yCenter,Math.sin(a)*t1.r*0.7,C.rosePale,C.goldPale,0.85);}
for(let i=0;i<4;i++){const a=(i/4)*Math.PI*2+0.4; flower(Math.cos(a)*t2.r*0.7,t2.yCenter,Math.sin(a)*t2.r*0.7,C.sagePale,C.cream,0.72);}

// ── Animate ──
const timeDom=document.getElementById('timeDisplay');
let fT=0;

function updateHands(){
  const now=new Date();
  const hh=now.getHours()%12, mm=now.getMinutes(), ss=now.getSeconds(), ms=now.getMilliseconds();
  const sf=ss+ms/1000, mf=mm+sf/60, hf=hh+mf/60;
  // clockwise from above → negative rotation.y
  hourPivot.rotation.y = -(hf/12)*Math.PI*2;
  minPivot.rotation.y  = -(mf/60)*Math.PI*2;
  secPivot.rotation.y  = -(sf/60)*Math.PI*2;
  const pad=n=>String(n).padStart(2,'0');
  timeDom.textContent=`${pad(now.getHours())}:${pad(mm)}:${pad(ss)}`;
}

function animate(){
  requestAnimationFrame(animate);
  fT+=0.04;
  controls.update();

  candleLights.forEach((pl,i)=>{
    pl.intensity=0.18+0.1*Math.sin(fT*2.3+i*1.1)+0.06*Math.sin(fT*5.9+i*2.2);
  });
  flameOuters.forEach((f,i)=>{
    f.scale.x=1+0.14*Math.sin(fT*3.1+i);
    f.scale.z=1+0.11*Math.sin(fT*2.7+i*0.9);
    f.position.y=0.43+0.009*Math.sin(fT*4.1+i);
  });
  flameInners.forEach((f,i)=>{
    f.scale.x=1+0.09*Math.sin(fT*3.9+i*1.2);
    f.position.y=0.445+0.011*Math.sin(fT*3.4+i);
  });

  updateHands();
  renderer.render(scene, camera);
}
  animate();
}
buildScene();
</script>
